services:
  web:
    image: ghcr.io/sam101010101010/daily-tools-web:latest
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      - SITE_ADDRESS=${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend-java]
  backend-java:
    image: ghcr.io/sam101010101010/daily-tools-backend:latest
    restart: unless-stopped
    expose: ["8080"]
    environment:
      # tapdata preset passphrase; unset -> preset unavailable (VALIDATION_ERROR). Value lives only in
      # the VPS .env (deploy-user-owned, persists across deploys), never committed (ADR-0007 D7).
      - CRYPTO_PRESET_TAPDATA_KEY=${CRYPTO_PRESET_TAPDATA_KEY:-}
volumes:
  caddy_data:
  caddy_config:
