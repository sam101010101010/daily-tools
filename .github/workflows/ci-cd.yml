name: CI/CD
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
    inputs:
      sha:
        description: "image sha to (re)deploy for rollback; blank = current build"
        required: false
        default: ""
concurrency: { group: "cicd-${{ github.ref }}", cancel-in-progress: false }
jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm test
  backend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend-java } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - run: mvn -B test
  build-push:
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/sam101010101010/daily-tools-web:latest
            ghcr.io/sam101010101010/daily-tools-web:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-java/Dockerfile
          push: true
          tags: |
            ghcr.io/sam101010101010/daily-tools-backend:latest
            ghcr.io/sam101010101010/daily-tools-backend:${{ github.sha }}
  deploy:
    needs: [build-push]
    # push main: 需 build-push 绿。workflow_dispatch(回滚): 跳过 build-push 直接部署给定 sha。
    if: >-
      always() &&
      ( github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-push.result == 'success') )
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    env:
      # 回滚传入 sha，否则用本次 commit sha
      TARGET_SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}            # 回滚: compose 取自目标 sha (push 时 == github.sha, 无副作用)
      - uses: docker/login-action@v3            # 兼容 GHCR 转 private (ADR-0003 D4)；public 时也无害
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull images from GHCR and save to a tarball
        run: |
          set -e
          W=ghcr.io/sam101010101010/daily-tools-web
          B=ghcr.io/sam101010101010/daily-tools-backend
          docker pull "$W:${TARGET_SHA}"
          docker pull "$B:${TARGET_SHA}"
          docker tag "$W:${TARGET_SHA}" "$W:latest"
          docker tag "$B:${TARGET_SHA}" "$B:latest"
          docker save "$W:latest" "$B:latest" | gzip > images.tar.gz
      - name: Copy images + compose to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          source: "images.tar.gz,deploy/docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}
      - name: Load images + compose up on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            gunzip -c images.tar.gz | docker load
            rm -f images.tar.gz
            # air-gap: 无 git pull / 无 compose pull；compose 的 pull_policy:never 用本地已 load 的 :latest
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d
            docker image prune -f
