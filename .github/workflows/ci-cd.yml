name: CI/CD
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
    inputs:
      sha:
        description: "image sha to (re)deploy for rollback; blank = current build"
        required: false
        default: ""
concurrency: { group: "cicd-${{ github.ref }}", cancel-in-progress: false }
jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm test
  backend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend-java } }
    env:
      # Dummy exercises the value-agnostic preset round-trip pin (functional coverage without the real
      # KEY). The two ciphertext-fidelity pins stay gated on _REAL and skip — unless the real KEY is set
      # as a secret, which also flips _REAL=1 so they run in CI too (see CryptoServiceTest).
      CRYPTO_PRESET_TAPDATA_KEY: ${{ secrets.CRYPTO_PRESET_TAPDATA_KEY || 'ci-dummy-not-the-real-tapdata-key' }}
      CRYPTO_PRESET_TAPDATA_KEY_REAL: ${{ secrets.CRYPTO_PRESET_TAPDATA_KEY != '' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - run: mvn -B test
  build-push:
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/sam101010101010/daily-tools-web:latest
            ghcr.io/sam101010101010/daily-tools-web:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-java/Dockerfile
          push: true
          tags: |
            ghcr.io/sam101010101010/daily-tools-backend:latest
            ghcr.io/sam101010101010/daily-tools-backend:${{ github.sha }}
  deploy:
    needs: [build-push]
    # push main: 需 build-push 绿。workflow_dispatch(回滚): 跳过 build-push 直接部署给定 sha。
    if: >-
      always() &&
      ( github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-push.result == 'success') )
    runs-on: ubuntu-latest
    permissions: { contents: read }            # 仅 checkout 需要；runner 不再 pull GHCR，无需 packages:read
    env:
      # 回滚传入 sha，否则用本次 commit sha
      TARGET_SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}            # 回滚: compose 取自目标 sha (push 时 == github.sha)
      - name: Pin compose image tags to the target sha
        run: |
          set -e
          # 钉死确定的 sha（不靠漂移的 :latest）；VPS 拉这个 sha，部署可复现、回滚天然 (ADR-0004 D2)
          sed -i "s#\(ghcr.io/sam101010101010/daily-tools-[a-z]*\):latest#\1:${TARGET_SHA}#g" deploy/docker-compose.prod.yml
          grep 'image:' deploy/docker-compose.prod.yml
      - name: Copy compose to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"        # 只传小 compose，无需自定义 timeout（默认足够）
          target: ${{ secrets.DEPLOY_PATH }}
      - name: Pull from ghcr.io + compose up on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m                   # 兜首次全量拉 ghcr(~9min)；后续增量层更快
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # ADR-0004: VPS 从 ghcr.io CDN 增量拉镜像；仍不连 github.com（compose 由 runner scp 下发）
            docker compose --env-file .env -f deploy/docker-compose.prod.yml pull
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d
            # -a: 镜像按 sha 打 tag（非漂移 :latest），旧 sha 不会变 dangling；-a 清掉不再被容器引用的旧 sha，防磁盘累积
            docker image prune -af
